<header class="navbar" [class.scrolled]="scrolled" [class.menu-open]="menuOpen">
  <!-- Scroll Progress Bar -->
  <div class="scroll-progress" [style.width.%]="scrollProgress"></div>

  <div class="nav-inner">
    <!-- Logo -->
    <a class="nav-logo" (click)="scrollTo('hero')" role="button" aria-label="The SAGA Varanasi — Home">
      <div class="logo-emblem">◈</div>
      <div class="logo-text">
        <span class="logo-main">THE SAGA</span>
        <span class="logo-sub">VARANASI · EST. 2026</span>
      </div>
    </a>

    <!-- Desktop Nav Links -->
    <nav class="nav-links" role="navigation" aria-label="Main Navigation">
      <a
        *ngFor="let link of navLinks"
        [id]="'nav-' + link.id"
        [class.active]="active === link.id"
        (click)="scrollTo(link.id)"
        role="button">
        {{ link.label }}
        <span class="nav-dot" *ngIf="active === link.id"></span>
      </a>
    </nav>

    <!-- Nav CTA -->
    <div class="nav-actions">
      <a href="tel:07355770378" class="nav-phone" aria-label="Call The SAGA">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M13 10.33v1.83A1.22 1.22 0 0 1 11.66 13.4a12.08 12.08 0 0 1-5.27-1.88 11.9 11.9 0 0 1-3.66-3.66A12.08 12.08 0 0 1 .85 2.52 1.22 1.22 0 0 1 2.06 1.27H3.9a1.22 1.22 0 0 1 1.22 1.05 7.84 7.84 0 0 0 .43 1.73 1.22 1.22 0 0 1-.28 1.29L4.51 6.1a9.77 9.77 0 0 0 3.66 3.66l.76-.76a1.22 1.22 0 0 1 1.29-.28 7.84 7.84 0 0 0 1.73.43A1.22 1.22 0 0 1 13 10.33z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>073557 70378</span>
      </a>
      <button id="nav-book-cta" class="nav-book-btn" (click)="openPopup()">
        Book Space
      </button>
    </div>

    <!-- Hamburger -->
    <button class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()" aria-label="Toggle navigation menu" [attr.aria-expanded]="menuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Drawer -->
  <div class="mobile-drawer" [class.open]="menuOpen" aria-hidden="!menuOpen">
    <nav class="drawer-links">
      <a *ngFor="let link of navLinks"
         [class.active]="active === link.id"
         (click)="scrollTo(link.id)">
        {{ link.label }}
      </a>
    </nav>
    <div class="drawer-cta">
      <a href="tel:07355770378" class="drawer-call">📞 073557 70378</a>
      <button class="drawer-book" (click)="openPopup()">Reserve Your Space →</button>
    </div>
  </div>
</header>
